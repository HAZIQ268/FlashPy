{% extends "base.html" %}

{% block content %}
<h3>Register</h3>

<form method="POST">
    {{ form.hidden_tag() }}

    {{ form.username.label }} <br>
    {{ form.username() }} <br><br>

    {{ form.password.label }} <br>
    {{ form.password() }} <br><br>

    {{ form.submit() }}
</form>

<a href="{{ url_for('login') }}">Already have an account?</a>
{% endblock %}
