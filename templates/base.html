<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Auth</title>
</head>
<body>
    <h2>Flask Authentication</h2>
    <hr>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <p style="color: red;">{{msg}}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %} {% endblock %}

</body>
</html>
