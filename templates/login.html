{% extends "base.html" %}

{% block content %}
    <h1>Login</h1>

    <form method="POST">
        <p>Username: <input type="text" name="username"></p>
        <p>Password: <input type="password" name="password"></p>
        <p><input type="submit" value="Login"></p>
    </form>

    <p>Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
{% endblock %}
